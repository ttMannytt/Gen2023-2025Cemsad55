<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
  /* CONTENEDOR PRINCIPAL */
  .ficha-producto {
    /* Flexbox: El "superpoder" para centrar todo */
    display: flex; 
    flex-direction: column; /* Alinea los elementos uno debajo del otro (en columna) */
    align-items: center;    /* Centra los elementos horizontalmente dentro de la columna */
    
    /* Estética de la tarjeta */
    width: 320px;
    margin: 50px auto;      /* Centra la tarjeta completa en la pantalla del navegador */
    padding: 20px;
    background-color: white;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    font-family: Arial, sans-serif;
  }

  /* ESTILO DE LA IMAGEN */
img {
    width: 200px;            /* Definimos un ancho */
    height: 200px;           /* Definimos un alto */
    
    /* ESTAS DOS LÍNEAS SON LA CLAVE PARA CENTRARLA: */
    display: block;          /* 1. Obligamos a la imagen a ser un bloque (no una letra) */
    margin: 0 auto 20px auto;/* 2. Margen Automático a los lados para empujarla al centro */
    
    border-radius: 50%;      /* Efecto extra: Foto circular para que luzca mejor */
    object-fit: cover;       /* Evita que la foto se vea estirada o aplastada */
    border: 4px solid #6F4E37;
  }

  /* ESTILO DE LOS TEXTOS */
  h3 {
    margin: 10px 0 5px 0;   /* Ajusta espacios arriba y abajo del título */
    color: #333;
    text-align: center;     /* Asegura que el texto interno también esté centrado */
  }

  p {
    color: #666;
    text-align: center;     /* Centra la descripción */
    font-size: 0.9rem;
    line-height: 1.4;       /* Mejora el espacio entre líneas de texto */
  }
</style>
</head>
<body>

  <div class="contenedor-foto">
    <!-- Insertamos una imagen de ejemplo de un café -->
    <img src="https://images.unsplash.com/photo-1550731358-491ded4af838?q=80&w=1587&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
     alt="Taza de café humeante sobre una mesa de madera">
    
    <h3>Nuestro Café Especial</h3>
    <p>Grano recién molido de Veracruz.</p>
  </div>

<body>
    
</body>
</html>
