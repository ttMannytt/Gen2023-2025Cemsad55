      </div>
  </div>
<div class="swiper-slide co-carousel__slide">

    <div class="co-card__shoe">

    <div class="co-card__info">

  </div>
</div>

<div class="swiper-slide co-carousel__slide">

      <div class="co-card__title text-mask"><span>Nike Pegasus</span></div>
      <div class="co-card__price text-mask"><span>$130.00</span></div>
    </div>
  </div>
</div>





</div>, initial-scale=1.0">
