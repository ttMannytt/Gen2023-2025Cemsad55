<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"> <!-- Asegura que los acentos se vean bien -->
  <style>
    /* --- ESTILOS GENERALES DEL MENÚ --- */
    .nav-interactivo {
      background-color: #333;   /* Fondo oscuro para contraste */
      font-family: 'Segoe UI', sans-serif;
      position: sticky;         /* Hace que el menú se quede "pegado" al subir (opcional) */
      top: 0;
      z-index: 1000;            /* Lo mantiene siempre al frente */
    }

    /* Quitamos puntos y márgenes a la lista principal */
    .nav-interactivo ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;            /* Alinea los botones en fila */
      justify-content: center;  /* Centra el menú horizontalmente */
    }

    /* Estilo de cada "botón" o celda del menú */
    .nav-interactivo li {
      position: relative;       /* Necesario para posicionar el sub-menú justo debajo */
    }

    /* Estilo de los enlaces (texto) */
    .nav-interactivo a {
      color: white;
      text-decoration: none;    /* Quita el subrayado azul */
      padding: 15px 25px;       /* Espacio para hacer clic fácilmente */
      display: block;           /* Hace que todo el cuadro sea clicable */
      transition: background 0.3s; /* Suaviza el cambio de color */
    }

    /* Efecto al pasar el mouse por las opciones principales */
    .nav-interactivo li:hover > a {
      background-color: #6F4E37; /* Cambia a color café */
    }

    /* --- ESTILOS DEL SUB-MENÚ (EL TRUCO) --- */
    .sub-menu {
      display: none;            /* OCULTO por defecto */
      position: absolute;       /* Se coloca flotando debajo del padre */
      background-color: #444;   /* Color un poco más claro que el principal */
      min-width: 150px;         /* Ancho mínimo para que no se vea apretado */
      box-shadow: 0 8px 16px rgba(0,0,0,0.2);
    }

    /* Cambiamos la dirección del sub-menú a columna */
    .sub-menu li {
      width: 100%;
    }

    /* MOSTRAMOS el sub-menú solo cuando el mouse está sobre "Menú" */
    .nav-interactivo li:hover .sub-menu {
      display: block;           /* Aparece mágicamente */
    }

    /* Estilo para los enlaces dentro del sub-menú */
    .sub-menu a {
      padding: 10px 20px;
      font-size: 0.9rem;
    }

    .sub-menu a:hover {
      background-color: #8D6E63; /* Un café más claro para el sub-menú */
    }
  </style>
</head>
<body>

  <!-- (Aquí iría tu código del Banner que ya tenemos) -->

  <!-- ESTRUCTURA DEL MENÚ INTERACTIVO -->
  <nav class="nav-interactivo">
    <ul>
      <li><a href="#">Inicio</a></li>
      
      <!-- Opción con Sub-Menú -->
      <li>
        <a href="#">Menú ▼</a>
        <ul class="sub-menu">
          <li><a href="#">Cafés</a></li>
          <li><a href="#">Alimentos</a></li>
        </ul>
      </li>

      <li><a href="#">Imágenes</a></li>
      <li><a href="#">Contacto</a></li>
      <li><a href="#">Comentarios</a></li>
    </ul>
  </nav>

</body>
</html>
